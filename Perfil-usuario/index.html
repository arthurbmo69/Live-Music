<!DOCTYPE html>
<html lang="pt-br">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Perfil do Usuário</title>
  <link rel="stylesheet" href="css/style.css" />
</head>
<body>
  <header>
    <h2 class="logo">Logo</h2>
    <nav class="navgation">
      <a href="indexLogin.html">Início</a>
      <a href="/Planos/planos.html">Planos</a>
      <a href="/Categorias/categorias.html">Categorias</a>
      <a href="/Perfil-usuario/index.html">Perfil do Usuário</a>
    </nav>
</header>
  <!-- Conteúdo principal -->
  <div class="content">
    <div class="profile-header">
      <img src="https://via.placeholder.com/100" alt="Foto de Perfil" class="profile-pic">
      <div class="user-info">
        <h2>Nome do Usuário</h2>
        <p>@nomeusuario</p>
      </div>
      <button class="edit-btn">Editar Perfil</button>
    </div>

    <section class="stats">
      <div class="stat-box">
        <h3>120</h3>
        <p>Músicas Curtidas</p>
      </div>
      <div class="stat-box">
        <h3>35</h3>
        <p>Artistas Seguidos</p>
      </div>
      <div class="stat-box">
        <h3>10</h3>
        <p>Playlists</p>
      </div>
    </section>

    <section class="favorites">
      <h3>Músicas Curtidas</h3>
      <ul class="music-list">
        <li><span>🎵</span> Nome da música 1</li>
        <li><span>🎵</span> Nome da música 2</li>
        <li><span>🎵</span> Nome da música 3</li>
      </ul>
    </section>
  </div>
    <!-- Player -->
<footer class="music-player">
  <div class="song-info">
    <img src="https://via.placeholder.com/50" alt="Capa" />
    <div>
      <strong>Nome da música</strong>
      <p>Nome do artista</p>
    </div>
  </div>
  <div class="player-controls">
    <button>⏮️</button>
    <button>▶️</button>
    <button>⏭️</button>
  </div>
</footer>
</body>
</html>
